name: Crypto Alert Bot

on:
  schedule:
    - cron: "*/5 * * * *"

  workflow_dispatch:

jobs:
  run-bot:
    runs-on: ubuntu-latest

    permissions:
      contents: write

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install dependencies
        run: |
          pip install -r requirements.txt

      - name: Run bot
        env:
          BOT_TOKEN: ${{ secrets.BOT_TOKEN }}
          CHAT_ID: ${{ secrets.CHAT_ID }}
        run: |
          python main.py

      - name: Commit changes
        run: |
          git config --global user.name "crypto-alert-bot"
          git config --global user.email "bot@github.com"

          git add alerts.json triggered_alerts.json

          git diff --cached --quiet || git commit -m "Update alerts and history"

          git push
